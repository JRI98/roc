<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Roc Echo Platform</title>
        <style>
            body {
                font-family: monospace;
                max-width: 720px;
                margin: 2em auto;
                padding: 0 1em;
            }
            h1 {
                margin: 0 0 1em;
            }
            h2 {
                font-size: 1.1em;
                margin: 1.5em 0 0.5em;
            }
            .card {
                border: 1px solid #ddd;
                border-radius: 4px;
                padding: 0.75em;
                margin-bottom: 0.75em;
                background: #fafafa;
            }
            .card-header {
                display: flex;
                align-items: center;
                gap: 0.5em;
                margin-bottom: 0.4em;
            }
            .card-header label {
                font-weight: bold;
            }
            .card-header input.module-name {
                flex: 1;
                font-family: inherit;
                font-size: 14px;
                padding: 0.2em 0.4em;
            }
            .card-header .remove {
                padding: 0.2em 0.6em;
                font-size: 12px;
            }
            textarea {
                width: 100%;
                height: 8em;
                font-family: inherit;
                font-size: 14px;
                tab-size: 4;
                box-sizing: border-box;
            }
            #source {
                height: 10em;
            }
            #output {
                background: #111;
                color: #0f0;
                padding: 1em;
                min-height: 2em;
                white-space: pre-wrap;
            }
            #errors {
                padding: 0.5em 0;
            }
            #errors .terminal {
                background: #111;
                color: #ddd;
                padding: 1em;
                white-space: pre-wrap;
                overflow-x: auto;
            }
            button {
                padding: 0.4em 1.2em;
                font-size: 14px;
            }
            button:disabled {
                opacity: 0.5;
                cursor: not-allowed;
            }
            #run {
                margin-top: 0.5em;
            }
            #add-module {
                margin-bottom: 0.5em;
            }
            .ansi-bold {
                font-weight: 700;
            }
            .ansi-dim {
                opacity: 0.72;
            }
            .ansi-italic {
                font-style: italic;
            }
            .ansi-underline {
                text-decoration: underline;
            }
            .ansi-fg-black {
                color: #282a36;
            }
            .ansi-fg-red {
                color: #ff6b6b;
            }
            .ansi-fg-green {
                color: #62d68f;
            }
            .ansi-fg-yellow {
                color: #f4d35e;
            }
            .ansi-fg-blue {
                color: #74b9ff;
            }
            .ansi-fg-magenta {
                color: #d59cff;
            }
            .ansi-fg-cyan {
                color: #55e6d9;
            }
            .ansi-fg-white {
                color: #f5f2ff;
            }
            .ansi-fg-bright-black {
                color: #8b90a3;
            }
            .ansi-fg-bright-red {
                color: #ff8a8a;
            }
            .ansi-fg-bright-green {
                color: #7ee89f;
            }
            .ansi-fg-bright-yellow {
                color: #ffea7a;
            }
            .ansi-fg-bright-blue {
                color: #9ad4ff;
            }
            .ansi-fg-bright-magenta {
                color: #e0b3ff;
            }
            .ansi-fg-bright-cyan {
                color: #71fff1;
            }
            .ansi-fg-bright-white {
                color: #fff;
            }
            .skip-notice {
                color: #a60;
                font-size: 13px;
                padding: 0.25em 0;
            }
        </style>
    </head>
    <body>
        <h1>Roc Echo Platform</h1>

        <section>
            <h2>main (headerless app)</h2>
            <textarea id="source">
import Greeting

main! = |_| {
    echo!(Greeting.msg)
    Ok({})
}</textarea
            >
            <button id="run" disabled>Run</button>
        </section>

        <section>
            <h2>Modules</h2>
            <div id="modules-list"></div>
            <button id="add-module">+ Add module</button>
        </section>

        <div id="errors"></div>
        <pre id="output"></pre>

        <template id="module-template">
            <div class="card module-card">
                <div class="card-header">
                    <label>Name:</label>
                    <input
                        class="module-name"
                        type="text"
                        spellcheck="false"
                        autocomplete="off"
                    />
                    <button class="remove" type="button">Remove</button>
                </div>
                <textarea class="module-content"></textarea>
            </div>
        </template>

        <script src="app.js"></script>
    </body>
</html>
